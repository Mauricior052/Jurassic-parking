@if (isModalOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
  <div class="bg-white w-full max-w-md rounded-3xl border border-slate-200 shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
    
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
      <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
        <ng-icon [name]="editing ? 'lucideEdit3' : 'lucideUserPlus'" class="text-parking-primary"></ng-icon>
        {{ editing ? 'Editar Usuario' : 'Crear Nuevo Usuario' }}
      </h2>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <ng-icon name="lucideX" size="24"></ng-icon>
      </button>
    </div>

    <form (ngSubmit)="save()" class="p-6 space-y-4">
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nombre Completo</label>
        <div class="relative group">
          <ng-icon name="lucideUser" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary"></ng-icon>
          <input type="text" [(ngModel)]="form.nombre" name="name" required
            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3 pl-11 text-sm outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/5 transition-all"
            placeholder="Ej. Juan Pérez">
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Correo Electrónico</label>
        <div class="relative group">
          <ng-icon name="lucideMail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary"></ng-icon>
          <input type="email" [(ngModel)]="form.email" name="email" required
            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3 pl-11 text-sm outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/5 transition-all"
            placeholder="correo@ejemplo.com">
        </div>
      </div>

      <div class="flex gap-3 pt-4">
        <button type="button" (click)="closeModal()"
          class="flex-1 px-4 py-3 rounded-2xl font-bold text-slate-600 hover:bg-slate-100 transition-all">
          Cancelar
        </button>
        <button type="submit"
          class="flex-2 bg-parking-primary text-white font-bold rounded-2xl px-4 py-3 hover:bg-rose-700 shadow-glow active:scale-95 transition-all">
          {{ editing ? 'Guardar Cambios' : 'Confirmar Registro' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
