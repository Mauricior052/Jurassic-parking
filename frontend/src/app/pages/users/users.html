<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Gestión de Usuarios</h1>
      <p class="text-sm text-parking-muted">Administra los accesos y roles del personal.</p>
    </div>
    <span class="text-xs font-bold text-parking-primary bg-parking-primary/10 px-4 py-2 rounded-full border border-parking-primary/20">
      {{ (users$ | async)?.total }} registrados
    </span>
  </div>

  <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
    <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
      <ng-icon name="lucideUserPlus" class="text-parking-primary"></ng-icon>
      {{ editing ? 'Editar información' : 'Nuevo registro' }}
    </h2>
    
    <form (ngSubmit)="save()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="relative group">
        <ng-icon name="lucideUser" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition-colors"></ng-icon>
        <input
          type="text"
          placeholder="Nombre completo"
          [(ngModel)]="form.nombre"
          name="name"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-11 text-sm outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/5 transition-all"
        />
      </div>

      <div class="relative group">
        <ng-icon name="lucideMail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition-colors"></ng-icon>
        <input
          type="email"
          placeholder="Correo electrónico"
          [(ngModel)]="form.email"
          name="email"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-11 text-sm outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/5 transition-all"
        />
      </div>

      <button
        type="submit"
        [disabled]="!form.nombre || !form.email"
        class="bg-parking-primary text-white font-bold rounded-xl px-6 py-3 hover:bg-rose-700 shadow-glow active:scale-95 disabled:opacity-50 disabled:pointer-events-none transition-all flex items-center justify-center gap-2"
      >
        <ng-icon [name]="editing ? 'lucideRefreshCw' : 'lucideCheckCircle'"></ng-icon>
        {{ editing ? 'Actualizar' : 'Registrar' }}
      </button>
    </form>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div class="relative flex-1 max-w-md">
        <ng-icon name="lucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></ng-icon>
        <input
          type="text"
          placeholder="Buscar por nombre o correo..."
          (input)="onSearch($event)"
          class="w-full bg-white border border-slate-200 pl-10 pr-4 py-2 rounded-lg text-sm outline-none focus:border-parking-primary transition-all"
        />
      </div>
      <div class="flex gap-2">
         </div>
    </div>

    <div class="overflow-x-auto">
      <ag-grid-angular
        class="ag-theme-alpine w-full"
        style="height: 400px;"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [pagination]="true"
        [paginationPageSize]="10"
        (gridReady)="onGridReady($event)">
      </ag-grid-angular>
    </div>
  </div>
</div>
