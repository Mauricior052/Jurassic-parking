<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black">
        <ng-icon name="lucideUsers" size="20"></ng-icon>Gestión de Usuarios
      </h1>
      <p class="pl-2 text-sm text-parking-muted">Administra los usuarios del sistema.</p>
    </div>

    <button (click)="openModal()" class="btn-primary">
      <ng-icon name="lucidePlus" size="18"></ng-icon>
      Nuevo Usuario
    </button>
  </div>

  <!-- BUSCADOR -->
  <div class="relative mb-1">
    <ng-icon name="lucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-parking-muted"></ng-icon>
    <input placeholder="Buscar usuarios..." (input)="onSearch($event)" class="input-search" />
  </div>

  <!-- GRID -->
  <div class="rounded-2xl border border-parking-border overflow-hidden shadow-sm">
    <ag-grid-angular
      class="w-full"
      style="height: 503px;"
      [theme]="themeService.gridTheme()"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      [paginationPageSizeSelector]="[10, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>

@if (isModalOpen) {
<div #backdrop (click)="$event.target === backdrop && closeModal()" class="fixed inset-0 z-100 flex items-center justify-center bg-black/60 backdrop-blur-[2px] p-4">
  <div (click)="$event.stopPropagation()" class="w-full max-w-md bg-parking-surface rounded-3xl shadow-2xl border border-parking-border overflow-hidden animate-enter">
    
    <div class="px-6 py-4 border-b border-parking-border flex items-center justify-between">
      <h2 class="text-lg font-extrabold text-parking-text tracking-tight flex items-center gap-2">
        <ng-icon [name]="editing ? 'lucideEdit3' : 'lucideUserPlus'" class="text-parking-primary"></ng-icon>
        {{ editing ? 'Editar Usuario' : 'Nuevo Usuario' }}
      </h2>
      <button (click)="closeModal()" class="text-parking-muted hover:text-parking-primary transition cursor-pointer">
        <ng-icon name="lucideX" size="22"></ng-icon>
      </button>
    </div>

    <form (ngSubmit)="save()" class="p-6 space-y-4">
      <div class="space-y-1">
        <label class="label ml-1">Nombre</label>
        <div class="relative group">
          <ng-icon name="lucideUser" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="form.name" name="nombre" required class="input" />
        </div>
      </div>

      <div class="space-y-1">
        <label class="label ml-1">Email</label>
        <div class="relative group">
          <ng-icon name="lucideMail" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="form.email" name="email" required class="input" />
        </div>
      </div>

      @if (!editing) {
      <div class="space-y-1">
        <label class="label ml-1">Contraseña</label>
        <div class="relative group">
          <ng-icon name="lucideLock" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="form.password" name="password" required class="input" />
        </div>
      </div>
      }

      <div class="space-y-2">
        <label class="label ml-1">Rol</label>
        <div class="grid grid-cols-2 gap-3">
          <label>
            <input type="radio" [(ngModel)]="form.role" name="role" value="client" class="hidden peer" />
            <div class="radio-card">
              <ng-icon name="lucideUser" size="18"></ng-icon>
              Cliente
            </div>
          </label>
          <label>
            <input type="radio" [(ngModel)]="form.role" name="role" value="admin" class="hidden peer" />
            <div class="radio-card">
              <ng-icon name="lucideShield" size="18"></ng-icon>
              Admin
            </div>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-4 border-t border-parking-border">
        <button type="button" (click)="closeModal()" 
          class="w-full py-3 rounded-2xl font-bold text-parking-text bg-parking-accent hover:opacity-80 transition-all flex items-center justify-center gap-2 cursor-pointer">
          Cancelar
        </button>
        
        <button type="submit" class="w-full btn-primary flex items-center justify-center gap-2">
          <ng-icon [name]="editing ? 'lucideRefreshCw' : 'lucideCheckCircle'" size="18"></ng-icon>
          {{ editing ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
