<div class="container">
  <aside class="sidebar">
    <div class="logo">
      <h2><ng-icon name="lucideParkingCircle"></ng-icon> ParkMaster</h2>
    </div>
    <nav>
      <ul>
        <li class="active">
          <a href="#"><ng-icon name="lucideCar" size="24" color="#3498db"></ng-icon> Dashboard</a>
        </li>
        <li>
          <a href="#"><ng-icon name="lucideParkingCircle" size="24" color="#3498db"></ng-icon> Entradas/Salidas</a>
        </li>
        <li>
          <a href="#"><ng-icon name="lucideClock" size="24" color="#3498db"></ng-icon> Historial</a>
        </li>
        <li>
          <a href="#"><ng-icon name="lucideSettings" size="24" color="#3498db"></ng-icon> Configuración</a>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h1>Panel de Inicio</h1>
      <div class="user-info">
        <span>Admin</span>
        <div class="avatar"></div>
      </div>
    </header>

    <section class="stats-container">
      <div class="card stat-card">
        <h3>Espacios Totales</h3>
        <p class="number">50</p>
      </div>
      <div class="card stat-card available">
        <h3>Disponibles</h3>
        <p class="number">12</p>
      </div>
      <div class="card stat-card occupied">
        <h3>Ocupados</h3>
        <p class="number">38</p>
      </div>
      <div class="card stat-card revenue">
        <h3>Ganancia Hoy</h3>
        <p class="number">$1,250</p>
      </div>
    </section>

    <section class="parking-overview card">
      <h2>Estado de los Lugares</h2>
      <div class="parking-grid">
        <div class="slot occupied">A1</div>
        <div class="slot available">A2</div>
        <div class="slot occupied">A3</div>
        <div class="slot available">A4</div>
        <div class="slot available">A5</div>
        <div class="slot occupied">A6</div>
        <div class="slot available">A7</div>
        <div class="slot available">A8</div>
      </div>
    </section>
  </main>
</div>
