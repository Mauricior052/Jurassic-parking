<div class="back">
  <div class="container" [ngClass]="{ active: isActive }">

    <!-- REGISTER -->
    <div class="form-container sign-up">
      <form (ngSubmit)="register()">
        <h1>Crea una Cuenta</h1>
        <div class="social-icons">
          <div #googleRegisterBtn></div>
        </div>
        <span>o usa tu email para registrarte</span>

        <div class="input-container">
          <input name="name" placeholder="Nombre" [(ngModel)]="registerData.nombre" required />
          <ng-icon name="lucideUser"></ng-icon>
        </div>
        <div class="input-container">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="registerData.email" required />
          <ng-icon name="lucideMail"></ng-icon>
        </div>
        <div class="input-container">
          <input type="password" name="password" placeholder="Password" [(ngModel)]="registerData.password" required />
          <ng-icon name="lucideLock"></ng-icon>
        </div>
        <button type="submit">Registrar</button>
      </form>
    </div>

    <!-- LOGIN -->
    <div class="form-container sign-in">
      <form (ngSubmit)="login()">
        <h1>Iniciar Sesión</h1>
        <div class="social-icons">
          <div #googleLoginBtn></div>
        </div>
        <span>o usa tu email y contraseña</span>

        <div class="input-container">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="loginData.email" required />
          <ng-icon name="lucideMail"></ng-icon>
        </div>
        <div class="input-container">
          <input type="password" name="password" placeholder="Password" [(ngModel)]="loginData.password" required />
          <ng-icon name="lucideLock"></ng-icon>
        </div>
        <div class="remember-forget">
          <label>
            <input type="checkbox" name="remember" [(ngModel)]="loginData.rememberMe"> 
            Recuérdame
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit">Iniciar Sesión</button>
      </form>
    </div>

    <!-- TOGGLE -->
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Bienvenido!</h1>
          <p>Ingresa tus datos personales para usar todas las funciones del sitio</p>
          <button class="hidden" (click)="showLogin()">Iniciar Sesión</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Hola de nuevo!</h1>
          <p>Regístrate con tus datos personales para usar todas las funciones del sitio</p>
          <button class="hidden" (click)="showRegister()">Registrar</button>
        </div>
      </div>
    </div>
  </div>
</div>
