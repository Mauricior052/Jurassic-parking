<div class="back-gradient text-parking-text flex flex-col items-center justify-center h-screen transition-colors duration-500">
  <div class="absolute inset-0 bg-black/30 z-0"></div>

  <div class="container-slider relative overflow-hidden backdrop-blur-xl rounded-[30px] shadow-[0_25px_60px_rgba(0,0,0,0.5)] w-200 max-w-full min-h-120 border border-parking-border/20" 
       [ngClass]="{ active: isActive() }">
    
    <!-- REGISTER -->
    <div class="form-container sign-up h-full absolute top-0 transition-all duration-600 ease-in-out left-0 w-1/2 opacity-0 z-1">
      <form (ngSubmit)="register()" class="bg-black/10 flex flex-col items-center justify-center px-10 h-full">
        <h1 class="text-3xl font-black mb-2">Crea una Cuenta</h1>
        <div class="social-icons my-2">
          <div #googleRegisterBtn></div>
        </div>
        <span class="text-xs text-parking-muted mb-4">o usa tu email para registrarte</span>

        <div class="input-group relative flex items-center w-full mb-2">
          <input name="name" placeholder="Nombre" [(ngModel)]="registerData.name" required class="input-login" />
          <ng-icon name="lucideUser" class="absolute right-3 text-parking-muted"></ng-icon>
        </div>

        <div class="input-group relative flex items-center w-full mb-2">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="registerData.email" required 
                 class="input-login" />
          <ng-icon name="lucideMail" class="absolute right-3 text-parking-muted"></ng-icon>
        </div>

        <div class="input-group relative flex items-center w-full mb-4">
          <input type="password" name="password" placeholder="Contraseña" [(ngModel)]="registerData.password" required class="input-login" />
          <ng-icon name="lucideLock" class="absolute right-3 text-parking-muted"></ng-icon>
        </div>

        <button type="submit" class="bg-parking-primary/60 backdrop-blur-md text-xs font-bold py-3 px-12 rounded-xl uppercase tracking-widest hover:bg-parking-primary/40 transition-all active:scale-95 cursor-pointer">
          Registrar
        </button>
      </form>
    </div>


    <!-- LOGIN -->
    <div class="form-container sign-in h-full absolute top-0 transition-all duration-600 ease-in-out left-0 w-1/2 z-2">
      <form (ngSubmit)="login()" class="bg-black/10 flex flex-col items-center justify-center px-10 h-full">
        <h1 class="text-3xl font-black mb-2">Iniciar Sesión</h1>
        <div class="social-icons my-2">
          <div #googleLoginBtn></div>
        </div>
        <span class="text-xs text-parking-muted mb-4">o usa tu email y contraseña</span>

        <div class="input-group relative flex items-center w-full mb-2">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="loginData.email" required class="input-login" />
          <ng-icon name="lucideMail" class="absolute right-3 text-parking-muted"></ng-icon>
        </div>

        <div class="input-group relative flex items-center w-full mb-2">
          <input type="password" name="password" placeholder="Contraseña" [(ngModel)]="loginData.password" required class="input-login" />
          <ng-icon name="lucideLock" class="absolute right-3 text-parking-muted"></ng-icon>
        </div>

        <div class="flex justify-between items-center w-full my-3">
          <label class="flex items-center text-xs text-parking-muted cursor-pointer hover transition-colors">
            <input type="checkbox" name="remember" [(ngModel)]="loginData.rememberMe" class="mr-2 accent-parking-primary"> 
            Recuérdame
          </label>
          <a href="#" class="text-xs text-parking-muted hover:text-parking-primary transition-colors">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="bg-parking-primary/60 backdrop-blur-md text-xs font-bold py-3 px-12 rounded-xl uppercase tracking-widest hover:bg-parking-primary/40 transition-all active:scale-95 cursor-pointer">
          Iniciar Sesión
        </button>
      </form>
    </div>


    <!-- TOGGLE -->
    <div class="toggle-container absolute top-0 left-1/2 w-1/2 h-full overflow-hidden transition-all duration-600 ease-in-out z-1000 rounded-l-[150px]">
      <div class="toggle bg-parking-primary/60 backdrop-blur-xl h-full relative -left-full w-[200%] transition-all duration-600 ease-in-out">
        
        <div class="toggle-panel toggle-left absolute top-0 h-full w-1/2 flex flex-col items-center justify-center px-8 text-center transition-all duration-600 ease-in-out">
          <h1 class="text-3xl font-black mb-4">¡Bienvenido!</h1>
          <p class="text-sm leading-5 tracking-tight mb-6">Ingresa tus datos personales para usar todas las funciones del sitio</p>
          <button (click)="showLogin()" class="bg-transparent border-2 border-parking-text/50 text-xs font-bold py-3 px-12 rounded-xl uppercase tracking-widest hover:bg-parking-text hover:text-parking-primary transition-all cursor-pointer">
            Iniciar Sesión
          </button>
        </div>

        <div class="toggle-panel toggle-right absolute top-0 right-0 h-full w-1/2 flex flex-col items-center justify-center px-8 text-center transition-all duration-600 ease-in-out">
          <h1 class="text-3xl font-black mb-4">¡Hola de nuevo!</h1>
          <p class="text-sm leading-5 tracking-tight mb-6">Regístrate con tus datos personales para usar todas las funciones del sitio</p>
          <button (click)="showRegister()" class="bg-transparent border-2 border-parking-text/50 text-xs font-bold py-3 px-12 rounded-xl uppercase tracking-widest hover:bg-parking-text hover:text-parking-primary transition-all cursor-pointer">
            Registrar
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
