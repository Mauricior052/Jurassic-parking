  <div id="container" class="container" [class.active]="isActive">
    <div class="form-container sign-up">
      <form (submit)="register()">
        <h1>Crea una Cuenta</h1>
        <div class="social-icons">
          <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <span>o usa tu email para registrarte</span>
        <input name="name" placeholder="Name" [(ngModel)]="registerData.name" required />
        <input type="email" name="email" placeholder="Email" [(ngModel)]="registerData.email" required />
        <input type="password" name="password" placeholder="Password" [(ngModel)]="registerData.password" required />
        <button type="submit">Registrar</button>
      </form>
    </div>

    <div class="form-container sign-in">
      <form (submit)="login()">
        <h1>Iniciar Sesión</h1>
        <div class="social-icons">
          <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <span>o usa tu email y contraseña</span>
        <input type="email" name="email" placeholder="Email" [(ngModel)]="loginData.email" required />
        <input type="password" name="password" placeholder="Password" [(ngModel)]="loginData.password" required />
        <a href="#">¿Olvidaste tu contraseña?</a>
        <button type="submit">Iniciar Sesión</button>
      </form>
    </div>

    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Bienvenido!</h1>
          <p>Ingresa tus datos personales para usar todas las funciones del sitio</p>
          <button class="hidden" id="login" (click)="showLogin()">Iniciar Sesión</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Hola Amigo!</h1>
          <p>Regístrate con tus datos personales para usar todas las funciones del sitio</p>
          <button class="hidden" id="register" (click)="showRegister()">Registrar</button>
        </div>
      </div>
    </div>
  </div>
