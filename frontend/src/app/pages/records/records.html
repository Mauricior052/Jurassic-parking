<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black">
        <ng-icon name="LucideArrowLeftRight" class="text-parking-primary"></ng-icon>Control de Estacionamiento
      </h1>
      <p class="pl-2 text-sm text-parking-muted">Gestión de flujo de vehículos en tiempo real.</p>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div class="px-4 pb-3 pt-1 mb-4 gap-4 grid grid-cols-1 lg:grid-cols-12 items-center bg-parking-surface rounded-2xl border border-parking-border shadow-sm">
    <div class="lg:col-span-8 flex flex-wrap md:flex-nowrap items-end gap-3">
      
      <div class="w-full md:w-48 group">
        <label class="label pl-3 tracking-wider">Placa</label>
        <div class="relative">
          <ng-icon name="lucideSquareChartGantt" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input #plateInput [(ngModel)]="record().plate" (keyup.enter)="registerEntry()" class="input-lg" />
        </div>
      </div>

      <div class="w-full md:flex-1 group">
        <label class="label pl-3 tracking-wider">Descripción del Vehículo</label>
        <div class="relative">
          <ng-icon name="lucideCar" size="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="record().vehicle" (keyup.enter)="registerEntry()" class="input-lg" />
        </div>
      </div>

      <div>
        <button (click)="registerEntry()" class="btn-primary h-10.5 w">
          <ng-icon name="lucideLogIn" size="18"></ng-icon>Registrar
        </button>
      </div>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="relative mb-1">
    <ng-icon name="lucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-parking-muted"></ng-icon>
    <input placeholder="Buscar vehículos..." (input)="onSearch($event)" class="input-search" />
  </div>

  <!-- GRID -->
  <div class="rounded-2xl border border-parking-border overflow-hidden shadow-sm">
    <ag-grid-angular
      class="w-full"
      style="height: 335px;"
      [theme]="themeService.gridTheme()"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="6"
      [paginationPageSizeSelector]="[6, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
