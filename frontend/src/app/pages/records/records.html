<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black text-slate-900"><ng-icon name="LucideArrowLeftRight" class="text-parking-primary"></ng-icon>Control de Estacionamiento</h1>
      <p class="pl-2 text-sm text-slate-500">Gestión de flujo de vehículos en tiempo real.</p>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div class="px-4 py-3 mb-4 gap-4 grid grid-cols-1 lg:grid-cols-12 items-center bg-white rounded-2xl border border-slate-200 shadow-sm">
    <div class="lg:col-span-8 flex flex-wrap md:flex-nowrap items-end gap-3">
      
      <div class="w-full md:w-48 group">
        <label class="label pl-3 mb-1 tracking-wider">Placa</label>
        <div class="relative">
          <ng-icon name="lucideFileText" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition"></ng-icon>
          <input #plateInput [(ngModel)]="record().plate" (keyup.enter)="registerEntry()" class="input-lg" />
        </div>
      </div>

      <div class="w-full md:flex-1 group">
        <label class="label pl-3 mb-1 tracking-wider">Descripción del Vehículo</label>
        <div class="relative">
          <ng-icon name="lucideCar" size="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="record().vehicle" (keyup.enter)="registerEntry()" class="input-lg" />
        </div>
      </div>

      <div>
        <button (click)="registerEntry()" class="btn-primary h-10.5">
          <ng-icon name="lucideLogIn" size="18"></ng-icon>
          Registrar
        </button>
      </div>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="relative mb-1">
    <ng-icon name="lucideSearch"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
    </ng-icon>
    <input placeholder="Buscar vehículos..." (input)="onSearch($event)" class="px-3 py-2 pl-10 rounded-2xl w-full text-[14px] outline-none bg-parking-light-bg transition-all border border-slate-400/40 focus:border-parking-primary/50 focus:ring-2 focus:ring-parking-primary/10" />
  </div>

  <!-- GRID -->
  <div class="rounded-2xl border border-slate-300 overflow-hidden shadow-sm">
    <ag-grid-angular
      class="ag-theme-alpine w-full"
      style="height: 335px;"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="6"
      [paginationPageSizeSelector]="[6, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
