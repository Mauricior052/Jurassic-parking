<div class="space-y-6">
  <div class="flex items-center justify-between border-b border-slate-100 pb-4">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black text-slate-900">
        <ng-icon name="LucideArrowLeftRight" class="text-parking-primary"></ng-icon>
        Control de Estacionamiento
      </h1>
      <p class="pl-2 text-sm text-slate-500">Gestión de flujo de vehículos en tiempo real.</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end bg-slate-50/50 p-4 rounded-3xl border border-slate-200/60">
    
    <div class="lg:col-span-8 flex flex-wrap md:flex-nowrap items-center gap-3">
      
      <div class="w-full md:w-48 group">
        <label class="block pl-3 mb-1 text-xs font-bold text-slate-500 uppercase tracking-wider">Placa</label>
        <div class="relative">
          <ng-icon name="lucideCar" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="record.plate" placeholder="ABC-123" 
            class="w-full bg-white border border-slate-300 rounded-2xl py-3 pl-11 pr-4 text-sm font-bold uppercase outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/10 transition-all shadow-sm" />
        </div>
      </div>

      <div class="w-full md:flex-1 group">
        <label class="block pl-3 mb-1 text-xs font-bold text-slate-500 uppercase tracking-wider">Descripción del Vehículo</label>
        <div class="relative">
          <ng-icon name="lucideFileText" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="record.vehicle" placeholder="Ej: Toyota Hilux Gris" 
            class="w-full bg-white border border-slate-300 rounded-2xl py-3 pl-11 pr-4 text-sm outline-none focus:border-parking-primary focus:ring-4 focus:ring-parking-primary/10 transition-all shadow-sm" />
        </div>
      </div>

      <div class="pt-5 md:pt-0">
        <button (click)="registerEntry()" 
          class="h-13 flex items-center gap-3 bg-slate-900 text-white px-8 rounded-2xl font-black cursor-pointer hover:bg-parking-primary active:scale-95 transition-all duration-300 shadow-lg shadow-slate-200">
          <ng-icon name="lucideLogIn" size="20"></ng-icon>
          REGISTRAR
        </button>
      </div>
    </div>

    <div class="hidden lg:block lg:col-span-1 text-center text-slate-300 text-xl">|</div>

    <div class="lg:col-span-3 group">
      <label class="block pl-1 mb-1 text-xs font-bold text-slate-500 uppercase tracking-wider">Filtrar Tabla</label>
      <div class="relative">
        <ng-icon name="lucideSearch" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-parking-primary transition"></ng-icon>
        <input type="text" placeholder="Buscar placa..." (input)="onSearch($event)" 
          class="w-full bg-white/80 border border-slate-200 rounded-2xl py-3 pl-11 pr-4 text-sm outline-none focus:bg-white focus:border-parking-primary/50 transition-all" />
      </div>
    </div>
  </div>

  <div class="rounded-3xl border border-slate-200 overflow-hidden shadow-xl shadow-slate-100">
    <ag-grid-angular
      class="ag-theme-alpine w-full"
      style="height: 500px;"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
