<div class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black text-slate-900"><ng-icon name="LucideHistory" class="text-parking-primary"></ng-icon>Historial de entradas y salidas</h1>
      <p class="pl-2 text-sm text-slate-500">Revision de registros de vehículos.</p>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-[10px] font-bold uppercase text-slate-400 pl-1">Estacionamiento</label>
      <select 
        [ngModel]="record().parking" 
        (ngModelChange)="onParkingChange($event)"
        class="bg-white border border-slate-300 text-slate-700 text-sm rounded-xl focus:ring-parking-primary focus:border-parking-primary block w-full p-2.5 outline-none shadow-sm transition-all"
      >
        <option value="">Todos</option>
        @for (p of parkings(); track p.id) {
            <option [value]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="relative mb-1">
    <ng-icon name="lucideSearch"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
    </ng-icon>
    <input placeholder="Buscar vehículos..." (input)="onSearch($event)" class="px-3 py-2 pl-10 rounded-2xl w-full text-[14px] outline-none bg-parking-light-bg transition-all border border-slate-400/40 focus:border-parking-primary/50 focus:ring-2 focus:ring-parking-primary/10" />
  </div>

  <!-- GRID -->
  <div class="rounded-2xl border border-slate-300 overflow-hidden shadow-sm">
    <ag-grid-angular
      class="ag-theme-alpine w-full"
      style="height: 503px;"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      [paginationPageSizeSelector]="[10, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
