<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black">
        <ng-icon name="LucideHistory"></ng-icon>Historial de entradas y salidas
      </h1>
      <p class="pl-2 text-sm text-parking-muted">Revision de registros de vehículos.</p>
    </div>

    <div class="flex flex-col gap-1">
      <!-- <label class="text-[10px] font-bold uppercase text-slate-400 pl-1">Estacionamiento</label> -->
      <select [ngModel]="record().parking" (ngModelChange)="onParkingChange($event)"
        class="bg-parking-surface border border-parking-border text-sm rounded-xl focus:ring-parking-primary focus:border-parking-primary block w-full p-2.5 outline-none shadow-sm transition-all">
        <option value="all">Todos</option>
        @for (p of parkings(); track p.id) {
          <option [value]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="relative mb-1">
    <ng-icon name="lucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-parking-muted"></ng-icon>
    <input placeholder="Buscar vehículos..." (input)="onSearch($event)" class="input-search" />
  </div>

  <!-- GRID -->
  <div class="rounded-2xl border border-parking-border overflow-hidden shadow-sm">
    <ag-grid-angular
      class="w-full"
      style="height: 503px;"
      [theme]="themeService.gridTheme()"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      [paginationPageSizeSelector]="[10, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
