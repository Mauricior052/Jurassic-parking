<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="flex items-center gap-3 pl-2 text-2xl font-black">
        <ng-icon name="LucideParkingSquare" size="20"></ng-icon>Gestión de Estacionamientos
      </h1>
      <p class="pl-2 text-sm text-parking-muted">Administra los estacionamientos del sistema.</p>
    </div>

    <button (click)="openModal()" class="btn-primary">
      <ng-icon name="lucidePlus" size="18"></ng-icon>
      Nuevo Estacionamiento
    </button>
  </div>

  <div class="relative mb-1">
    <ng-icon name="lucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></ng-icon>
    <input placeholder="Buscar estacionamientos..." (input)="onSearch($event)" class="px-3 py-2 pl-10 rounded-2xl w-full text-[14px] outline-none bg-parking-light-bg transition-all border border-slate-400/40 focus:border-parking-primary/50 focus:ring-2 focus:ring-parking-primary/10" />
  </div>

  <div class="rounded-2xl border border-parking-border overflow-hidden shadow-sm">
    <ag-grid-angular
      class="w-full"
      style="height: 503px;"
      [theme]="themeService.gridTheme()"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      [paginationPageSizeSelector]="[10, 20, 50, 100]"
      [headerHeight]="40"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>

@if (isModalOpen) {
<div #backdrop (click)="$event.target === backdrop && closeModal()" class="fixed inset-0 z-100 flex items-center justify-center bg-black/60 backdrop-blur-[2px] p-4">  
  <div (click)="$event.stopPropagation()" class="w-full max-w-md bg-parking-surface rounded-3xl shadow-2xl border border-parking-border overflow-hidden animate-enter">

    <div class="px-6 py-4 border-b border-parking-border flex items-center justify-between bg-parking-bg">
      <h2 class="text-lg font-extrabold text-parking-text tracking-tight flex items-center gap-2">
        <ng-icon [name]="editing ? 'lucideEdit3' : 'lucideMapPin'" class="text-parking-primary"></ng-icon>
        {{ editing ? 'Editar Estacionamiento' : 'Nuevo Estacionamiento' }}
      </h2>

      <button (click)="closeModal()" class="text-parking-muted hover:text-parking-primary transition cursor-pointer">
        <ng-icon name="lucideX" size="22"></ng-icon>
      </button>
    </div>

    <form (ngSubmit)="save()" class="p-6 space-y-3">
      <div class="space-y-1">
        <label class="label ml-1">Nombre del Local</label>
        <div class="relative group">
          <ng-icon name="lucideWarehouse" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="form.name" name="nombre" required class="input pl-11" />
        </div>
      </div>

      <div class="space-y-1">
        <label class="label ml-1">Dirección</label>
        <div class="relative group">
          <ng-icon name="lucideMapPin" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
          <input [(ngModel)]="form.address" name="address" required class="input pl-11" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="label ml-1">Precio x Hora</label>
          <div class="relative group">
            <ng-icon name="lucideDollarSign" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
            <input type="number" [(ngModel)]="form.price" name="price" required class="input pl-11" />
          </div>
        </div>

        <div class="space-y-1">
          <label class="label ml-1">Total Espacios</label>
          <div class="relative group">
            <ng-icon name="lucideCar" class="absolute left-4 top-1/2 -translate-y-1/2 text-parking-muted group-focus-within:text-parking-primary transition"></ng-icon>
            <input type="number" [(ngModel)]="form.totalSpaces" name="totalSpaces" required class="input pl-11" />
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="label ml-1">Seguridad 24/7</label>
        <div class="grid grid-cols-2 gap-3">
          <label>
            <input type="radio" [(ngModel)]="form.security" name="security" [value]="true" class="hidden peer" />
            <div class="radio-card">
              <ng-icon name="lucideShieldCheck" size="18"></ng-icon>
              Sí
            </div>
          </label>

          <label>
            <input type="radio" [(ngModel)]="form.security" name="security" [value]="false" class="hidden peer" />
            <div class="radio-card">
              <ng-icon name="lucideShieldOff" size="18"></ng-icon>
              No
            </div>
          </label>
        </div>
      </div>

      <div class="flex gap-3 pt-6 mt-2 border-t border-parking-border">
        <button type="button" (click)="closeModal()" class="flex-1 py-3 rounded-2xl font-bold text-parking-text bg-parking-accent hover:opacity-80 transition-all flex items-center justify-center gap-2 cursor-pointer">
          Cancelar
        </button>
        <button type="submit" class="flex-1 btn-primary">
          <ng-icon [name]="editing ? 'lucideRefreshCw' : 'lucideCheckCircle'" size="18"></ng-icon>
          {{ editing ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>

    </form>
  </div>
</div>
}
