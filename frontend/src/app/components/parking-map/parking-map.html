<div class="editor-wrap">

  <div class="toolbar">
    <button (click)="addSlot()">+ Agregar</button>
    <button (click)="deleteSelected()" [disabled]="selectedIdx() === null">Eliminar</button>
    <div class="sep"></div>
    <button (click)="rotateSelected(45)" [disabled]="selectedIdx() === null">↻ 45°</button>
    <button (click)="setAngle(0)" [disabled]="selectedIdx() === null">Horizontal</button>
    <button (click)="setAngle(90)" [disabled]="selectedIdx() === null">Vertical</button>
    <div class="sep"></div>
    <button class="save-btn" (click)="save()">Guardar layout</button>
  </div>

  <div class="canvas-wrap">
    <svg
      #svgEl
      [attr.viewBox]="layout().viewBox"
      class="canvas-svg"
      xmlns="http://www.w3.org/2000/svg"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp()">

      <!-- Grid de referencia -->
      <defs>
        <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M 8 0 L 0 0 0 8" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>

      @for (slot of slots(); track slot.code; let i = $index) {
        <g [attr.transform]="getTransform(slot)" class="slot-group">

          <!-- Highlight selección -->
          @if (selectedIdx() === i) {
            <rect
              [attr.x]="-SW/2 - 4" [attr.y]="-SH/2 - 4"
              [attr.width]="SW + 8" [attr.height]="SH + 8"
              rx="8" fill="none"
              stroke="#3b82f6" stroke-width="1.5"
              stroke-dasharray="5 3"/>
          }

          <!-- Cuerpo del slot -->
          <rect
            [attr.x]="-SW/2" [attr.y]="-SH/2"
            [attr.width]="SW" [attr.height]="SH"
            rx="5"
            [attr.fill]="selectedIdx() === i ? '#3b82f620' : '#22c55e12'"
            [attr.stroke]="selectedIdx() === i ? '#3b82f6' : '#22c55e'"
            stroke-width="1.5"/>

          <!-- Silueta del carro -->
          <rect x="-13" y="-7" width="26" height="9" rx="3"
            [attr.fill]="selectedIdx() === i ? '#3b82f640' : '#22c55e30'"
            [attr.stroke]="selectedIdx() === i ? '#3b82f6' : '#22c55e'"
            stroke-width="0.8"/>
          <rect x="-11" y="2" width="6" height="4" rx="2"
            [attr.fill]="selectedIdx() === i ? '#3b82f660' : '#22c55e50'"/>
          <rect x="5" y="2" width="6" height="4" rx="2"
            [attr.fill]="selectedIdx() === i ? '#3b82f660' : '#22c55e50'"/>

          <!-- Código -->
          <text
            text-anchor="middle" dominant-baseline="middle"
            y="12" font-size="9" font-weight="700" font-family="monospace"
            [attr.fill]="selectedIdx() === i ? '#3b82f6' : '#6b7280'">
            {{ slot.code }}
          </text>

        </g>
      }
    </svg>
  </div>

  <p class="status">{{ statusMsg() }}</p>
</div>
