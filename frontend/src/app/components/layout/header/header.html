<header class="main-header">
  <div class="header-container">
    <div class="logo-section" (click)="goToHome()">
      <div class="icon-wrapper">
        <ng-icon name="lucideParkingCircle"></ng-icon>
      </div>
      <h1 class="brand-name">Jurassic <span>Parking</span></h1>
    </div>

    <div class="search-section">
      <div class="search-bar">
        <ng-icon name="lucideSearch" class="search-icon"></ng-icon>
        <input type="text" placeholder="Buscar placa o ticket..." />
      </div>
    </div>

    <div class="actions-section">
      <div class="status-badge">
        <span class="dot"></span>
        {{ espaciosDisponibles }} libres
      </div>

      <div class="divider"></div>

      @if (user$ | async; as user) {
        <div class="user-profile-container">
          <div class="user-profile" (click)="toggleMenu()">
            <div class="user-info">
              <span class="user-name">{{ user.nombre }}</span>
              <span class="user-role">{{ user.role }}</span>
            </div>

            <div class="avatar-wrapper">
              <img src="https://ui-avatars.com/api/?name={{ user.nombre }}&background=e11d48&color=fff" alt="Avatar" />
              <ng-icon name="lucideChevronDown" [class.rotated]="isMenuOpen"></ng-icon>
            </div>
          </div>

          @if (isMenuOpen) {
            <div class="dropdown-menu">
              <div class="dropdown-header">
                <p class="user-email">{{ user.email }}</p>
              </div>

              <div class="dropdown-divider"></div>

              <button class="dropdown-item">
                <ng-icon name="lucideUser"></ng-icon>
                <span>Mi Perfil</span>
              </button>

              <div class="dropdown-divider"></div>

              <button class="dropdown-item logout" (click)="logout()">
                <ng-icon name="lucideLogOut"></ng-icon>
                <span>Cerrar Sesión</span>
              </button>
            </div>
          }
        </div>
      } @else {
        <button class="login-btn">Iniciar Sesión</button>
      }
    </div>
  </div>
</header>
