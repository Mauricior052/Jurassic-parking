<aside class="w-auto h-screen bg-parking-surface border-r border-parking-border flex flex-col sticky top-0">
  <nav class="flex-1 px-4 py-2 mt-4">
    <ul class="space-y-2">
      
      <li>
        <a routerLink="/" 
           routerLinkActive="bg-parking-primary text-white shadow-glow"
           [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-parking-muted hover:bg-parking-accent hover:text-white transition-all group">
          <ng-icon name="lucideLayoutDashboard" size="20" class="group-[.bg-parking-primary]:text-white"></ng-icon>
          <span class="font-medium">Dashboard</span>
        </a>
      </li>
      
      <li>
        <a routerLink="/entradas" 
           routerLinkActive="bg-parking-primary text-white shadow-glow"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-parking-muted hover:bg-parking-accent hover:text-white transition-all group">
          <ng-icon name="lucideParkingCircle" size="20" class="group-hover:text-parking-primary group-[.bg-parking-primary]:text-white"></ng-icon>
          <span class="font-medium">Entradas/Salidas</span>
        </a>
      </li>

      <li>
        <a routerLink="/historial" 
           routerLinkActive="bg-parking-primary text-white shadow-glow"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-parking-muted hover:bg-parking-accent hover:text-white transition-all group">
          <ng-icon name="lucideClock" size="20" class="group-hover:text-parking-primary group-[.bg-parking-primary]:text-white"></ng-icon>
          <span class="font-medium">Historial</span>
        </a>
      </li>

      <li>
        <a routerLink="/users" 
           routerLinkActive="bg-parking-primary text-white shadow-glow"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-parking-muted hover:bg-parking-accent hover:text-white transition-all group">
          <ng-icon name="lucideUser" size="20" class="group-hover:text-parking-primary group-[.bg-parking-primary]:text-white"></ng-icon>
          <span class="font-medium">Usuarios</span>
        </a>
      </li>

    </ul>
  </nav>

  <div class="p-4 border-t border-parking-border/50">
    <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-parking-occupied hover:bg-parking-occupied/10 transition-colors">
      <ng-icon name="lucideLogOut" size="20"></ng-icon>
      <span class="font-medium">Cerrar Sesión</span>
    </button>
  </div>
</aside>
