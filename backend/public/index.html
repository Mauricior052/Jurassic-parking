      var url = 'http://localhost:3000/api/login/google'

      function handleCredentialResponse(response) {
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: response.credential })
        })
        .then(resp => resp.json())
        .then(data => console.log('Nuestro server', data))
        .catch(console.log)
      }

      window.onload = function () {
        google.accounts.id.initialize({
          client_id: "180078472457-670vng2ombjdd261526baod0s1d5qujs.apps.googleusercontent.com",
          callback: handleCredentialResponse
        });

        google.accounts.id.renderButton(
          document.getElementById("buttonDiv"),
          { theme: "outline", size: "large" }  // customization attributes
        );

        google.accounts.id.prompt(); // also display the One Tap dialog
      }
    </script>
  </head>
  <body>
    <!-- g_id_onload contains Google Identity Services settings -->
    <div id="g_id_onload" data-auto_prompt="false" data-callback="handleCredentialResponse" data-client_id="886871992771-peo1cq8l376htch5obf47coce16o9ue0.apps.googleusercontent.com"></div>
    <!-- g_id_signin places the button on a page and supports customization -->
    <div class="g_id_signin"></div>
